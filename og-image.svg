<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="30%" style="stop-color:#FFE8F0"/>
      <stop offset="70%" style="stop-color:#F0E8FF"/>
      <stop offset="100%" style="stop-color:#E8F8F0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="50%" style="stop-color:#C77DFF"/>
      <stop offset="100%" style="stop-color:#4ECDC4"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#C77DFF"/>
    </linearGradient>
    <radialGradient id="circle1" cx="10%" cy="20%" r="35%">
      <stop offset="0%" style="stop-color:rgba(255,107,157,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,107,157,0)"/>
    </radialGradient>
    <radialGradient id="circle2" cx="85%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:rgba(78,205,196,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(78,205,196,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#circle1)"/>
  <rect width="1200" height="630" fill="url(#circle2)"/>

  <!-- Floating emojis -->
  <text x="80" y="80" font-size="36" opacity="0.18">🎁</text>
  <text x="1080" y="100" font-size="32" opacity="0.15">✨</text>
  <text x="140" y="540" font-size="30" opacity="0.15">🎀</text>
  <text x="1050" y="550" font-size="34" opacity="0.18">💝</text>
  <text x="60" y="320" font-size="28" opacity="0.12">⭐</text>
  <text x="1120" y="340" font-size="28" opacity="0.12">🎊</text>

  <!-- Main emoji -->
  <text x="600" y="200" text-anchor="middle" font-size="80">🎁</text>

  <!-- Title -->
  <text x="600" y="300" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="68" font-weight="900" fill="url(#textGrad)">Geschenk-Finder</text>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#888">Finde das perfekte Geschenk in 30 Sekunden mit KI</text>

  <!-- Button -->
  <rect x="430" y="410" width="340" height="56" rx="28" fill="url(#btnGrad)"/>
  <text x="600" y="447" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="white">Jetzt ausprobieren</text>
</svg>